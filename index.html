    --border: rgba(255,255,255,0.10); --accent:#eda100; --accent-ink:#ffd88a; --good:#0ca30c; --bad:#e66767;
    --cat-vivienda:#c9915a; --cat-comida:#3987e5; --cat-delivery:#008300; --cat-transporte:#d55181;

    --page: #f9f9f7; --surface:#fcfcfb; --surface-2:#f2f1ec;
    --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781; --grid:#e1e0d9;

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--page);
    color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 14px;
  }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 20px 20px 60px; }

  /* top bar */
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
  .topbar h1 { font-size: 17px; margin: 0; font-weight: 650; }
  .refresh-status { font-size: 11.5px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .refresh-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--good); display:inline-block; }
  .refresh-dot.stale { background: var(--muted); }
  .sheet-link { font-size: 12px; color: var(--accent-ink); text-decoration: none; border: 1px solid var(--border); padding: 5px 10px; border-radius: 7px; }
  .sheet-link:hover { background: var(--surface-2); }

  /* tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid var(--border); }
  .tab-btn {
    appearance: none; border: none; background: none; cursor: pointer;
    font-family: inherit; font-size: 13px; color: var(--ink-2); font-weight: 550;
    padding: 9px 14px; border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active { color: var(--ink); border-bottom-color: var(--accent); }
  .tab-btn .n { color: var(--muted); font-weight: 400; }

  section { margin-top: 28px; }
  section:first-of-type { margin-top: 0; }
  .section-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .section-head h2 { font-size: 13px; margin: 0; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-2); font-weight: 650; }
  .section-head .tag { font-size: 11.5px; color: var(--muted); }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }

  /* stat tiles */
  .stat-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  @media (min-width: 700px) { .stat-row { grid-template-columns: repeat(4, 1fr); } }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .stat .k { font-size: 11px; color: var(--ink-2); margin-bottom: 5px; }
  .stat .v { font-size: 20px; font-weight: 650; }
  .stat .v.good { color: var(--good); }
  .stat .v.bad { color: var(--bad); }
  .stat .v small { font-size: 12px; font-weight: 500; color: var(--ink-2); }
  .stat .sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .card + .card { margin-top: 12px; }
  .card h3 { margin: 0 0 4px; font-size: 11.5px; font-weight: 650; color: var(--ink-2); text-transform: uppercase; letter-spacing: 0.03em; }

  .donut-wrap { display: flex; align-items: center; gap: 18px; margin-top: 8px; flex-wrap: wrap; justify-content: space-between; }
  svg.donut { flex: 1 1 auto; max-width: 100%; height: auto; min-width: 120px; }
  .donut-legend { display: flex; flex-direction: column; gap: 8px; font-size: 12px; flex: 1 1 220px; min-width: 190px; }
  .donut-legend li { list-style: none; display: flex; align-items: center; gap: 8px; }
  .donut-legend .name { text-align: left; color: var(--ink); }
  .donut-legend .pct { color: var(--ink-2); margin-left: 8px; }
  .donut-legend .amt-col { margin-left: auto; padding-left: 10px; text-align: right; }
  .delta { font-size: 10.5px; display: block; }
  .delta.up { color: var(--bad); }
  .delta.down { color: var(--good); }
  .delta.new { color: var(--muted); }
  .cat-swatch { width: 8px; height: 8px; border-radius: 2px; display: inline-block; flex: none; }

  .donut-seg { cursor: pointer; transition: opacity 0.1s; }
  .donut-seg:hover { opacity: 0.82; }
  .donut-tooltip {
    position: fixed; display: none; pointer-events: none; z-index: 50;
    background: var(--ink); color: var(--page); font-size: 12px; line-height: 1.4;
    padding: 6px 10px; border-radius: 7px; white-space: nowrap;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  .donut-tooltip b { font-weight: 650; }

  .bars { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
  .bar-row { display: grid; grid-template-columns: 88px 1fr 76px; align-items: center; gap: 10px; font-size: 12.5px; }
  .bar-track { background: var(--surface-2); border-radius: 5px; height: 9px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 5px; }
  .bar-val { text-align: right; color: var(--ink-2); }

  /* ingresos */
  .ing-list { display: flex; flex-direction: column; gap: 6px; margin: 8px 0; max-height: 140px; overflow-y: auto; }
  .ing-row { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 8px; font-size: 12.5px; padding: 4px 0; border-bottom: 1px solid var(--grid); }
  .ing-month { color: var(--muted); font-size: 10.5px; }
  .ing-amt { color: var(--good); font-weight: 600; }
  .ing-del { appearance: none; border: none; background: none; color: var(--muted); cursor: pointer; font-size: 15px; line-height: 1; padding: 0 2px; }
  .ing-del:hover { color: var(--bad); }
  .ing-form { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .ing-form input[type="text"] { flex: 1 1 130px; }
  .ing-form input[type="number"] { flex: 1 1 76px; }
  .ing-form select { flex: 0 0 58px; }
  .ing-form input, .ing-form select {
    font-family: inherit; font-size: 12.5px; padding: 6px 8px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface); color: var(--ink);
  }
  .ing-form button {
    flex: 0 0 32px;
    appearance: none; border: 1px solid var(--border); background: var(--accent); color: #fff;
    border-radius: 6px; font-size: 15px; cursor: pointer;
  }
  .ing-empty { font-size: 12px; color: var(--muted); margin: 4px 0; }
  .ing-hint { font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* table */
  .table-scroll { overflow-x: auto; max-height: 560px; overflow-y: auto; }
  table.tx { width: 100%; border-collapse: collapse; font-size: 12.5px; min-width: 680px; }
  table.tx th {
    text-align: left; font-weight: 650; color: var(--ink-2);
    background: var(--surface-2); padding: 8px 12px; white-space: nowrap;
    border-bottom: 1px solid var(--grid); position: sticky; top: 0; z-index: 1;
  }
  table.tx td { padding: 7px 12px; border-bottom: 1px solid var(--grid); white-space: nowrap; }
  table.tx td.monto { text-align: right; font-weight: 600; }
  table.tx tr:hover td { background: var(--surface-2); }
  .cat-chip { display: inline-flex; align-items: center; gap: 6px; }
  .bank-chip { font-size: 11px; color: var(--muted); }
  .usd-tag { font-size: 10px; color: var(--bad); border: 1px solid currentColor; border-radius: 4px; padding: 0 4px; margin-left: 6px; }

  footer.note {
    margin-top: 36px; padding-top: 16px; border-top: 1px solid var(--border);
    font-size: 11.5px; color: var(--muted); line-height: 1.6;
  }
</style>

function fmtMoney(n) {
  return n.toLocaleString("es-PE", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtDate(f) {
  const [y,m,d] = f.split("-");
  return `${d}/${m}/${y}`;
}
function monthKey(f) { return f.slice(0,7); }
function monthLabel(k) {
  const names = {"01":"Enero","02":"Febrero","03":"Marzo","04":"Abril","05":"Mayo","06":"Junio","07":"Julio","08":"Agosto","09":"Septiembre","10":"Octubre","11":"Noviembre","12":"Diciembre"};
  const [y,m] = k.split("-");
  return `${names[m]} ${y}`;
}
function prevMonthKey(k) {
  const [y,m] = k.split("-").map(Number);
  const d = new Date(y, m-2, 1); // m is 1-indexed; m-2 -> previous month, 0-indexed
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}

// Agrega el alquiler fijo (S/3000, día 15) para cada mes presente en los datos, si no existe ya.
function injectFixedExpenses(rows) {
  const months = new Set(rows.map(r => monthKey(r.f)));
  const out = rows.slice();
  for (const mk of months) {
    const already = rows.some(r => r.cat === "Vivienda" && monthKey(r.f) === mk);
    if (!already) {
      out.push({
        f: `${mk}-${String(RENT_DAY).padStart(2,"0")}`, h: "12:00 AM", b: "Manual", t: "Gasto fijo",
        m: RENT_AMOUNT, c: "PEN", mp: RENT_AMOUNT, tc: null, co: "Alquiler mensual", cat: "Vivienda"
      });
    }
  }
  return out;
}

function setTX(rows) { TX = injectFixedExpenses(rows); }

// ---- ingresos (manuales, persistidos en este navegador) ----
function loadIngresos() {
  try { return JSON.parse(localStorage.getItem(INGRESOS_KEY) || "{}"); } catch (e) { return {}; }
}
function saveIngresos(data) {
  try { localStorage.setItem(INGRESOS_KEY, JSON.stringify(data)); } catch (e) {}
}
function addIngreso(mk, desc, amount, moneda, tipoCambio) {
  const data = loadIngresos();
  data[mk] = data[mk] || [];
  const montoPEN = moneda === "USD" ? amount * tipoCambio : amount;
  data[mk].push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
    desc, amount, moneda: moneda || "PEN", tipoCambio: moneda === "USD" ? tipoCambio : null, montoPEN
  });
  saveIngresos(data);
}
async function fetchUSDPENRate() {
  try {
    const res = await fetch("https://open.er-api.com/v6/latest/USD", { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const rate = data && data.rates && data.rates.PEN;
    return (typeof rate === "number" && rate > 0) ? rate : null;
  } catch (e) { return null; }
}
function removeIngreso(mk, id) {
  const data = loadIngresos();
  data[mk] = (data[mk] || []).filter(x => x.id !== id);
  saveIngresos(data);
}
function ingresosForScope(monthKeys) {
  const data = loadIngresos();
  let list = [];
  for (const mk of monthKeys) list = list.concat((data[mk] || []).map(x => ({ ...x, month: mk })));
  return list.sort((a,b) => a.month.localeCompare(b.month));
}
function incomeBySource(list) {
  const totals = {};
  for (const x of list) totals[x.desc] = (totals[x.desc]||0) + Number(x.montoPEN);
  return totals;
}

function computeStats(rows) {
  // Todo se totaliza en soles (r.mp = monto en soles; para filas USD ya viene convertido
  // al tipo de cambio del día de ese consumo). r.m/r.c guardan el monto original para mostrarlo.
  let totalPEN = 0, totalUSDOrigin = 0;
  const byCat = {}, byCatFromUSD = {}, byMerchant = {};
  for (const r of rows) {
    totalPEN += r.mp;
    byCat[r.cat] = (byCat[r.cat]||0) + r.mp;
    if (r.c === "USD") {
      totalUSDOrigin += r.m;
      byCatFromUSD[r.cat] = (byCatFromUSD[r.cat]||0) + r.mp;
    }
    byMerchant[r.co] = (byMerchant[r.co]||0) + 1;
  }
  const topMerchants = Object.entries(byMerchant).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const topCat = Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
  return { totalPEN, totalUSDOrigin, byCat, byCatFromUSD, topMerchants, topCat, count: rows.length };
}

function categoryTotalsForMonth(mk) {
  const totals = {};
  for (const r of TX) {
    if (monthKey(r.f) === mk) totals[r.cat] = (totals[r.cat]||0) + r.mp;
  }
  return totals;
}

function segmentedDonutSVG(entries, total, size, strokeWidth, centerLabel, centerSub) {
  const R = size/2 - strokeWidth/2 - 2, CIRC = 2*Math.PI*R;
  let offset = 0;
  let circles = `<circle r="${R}" fill="none" stroke="var(--surface-2)" stroke-width="${strokeWidth}"/>`;
  for (const [label, amt, color] of entries) {
    const len = total > 0 ? (amt/total)*CIRC : 0;
    const pct = total > 0 ? (amt/total*100) : 0;
    circles += `<circle class="donut-seg" data-cat="${label}" data-amt="${fmtMoney(amt)}" data-pct="${pct.toFixed(1)}"
      r="${R}" fill="none" stroke="${color}" stroke-width="${strokeWidth}"
      stroke-dasharray="${len.toFixed(2)} ${CIRC.toFixed(2)}" stroke-dashoffset="${(-offset).toFixed(2)}" transform="rotate(-90)"/>`;
    offset += len;
  }
  const c = size/2;
  return `<svg class="donut" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <g transform="translate(${c},${c})">${circles}
      <text text-anchor="middle" y="-3" fill="var(--ink)" font-size="${Math.max(13,size*0.075).toFixed(0)}" font-weight="650" style="pointer-events:none;">${centerLabel}</text>
      <text text-anchor="middle" y="16" fill="var(--ink-2)" font-size="${Math.max(10,size*0.05).toFixed(0)}" style="pointer-events:none;">${centerSub}</text>
    </g></svg>`;
}

function donutSVG(byCat, totalPEN, centerLabel, centerSub) {
  const entries = CAT_ORDER.filter(c => byCat[c] > 0).map(c => [c, byCat[c], CAT_COLOR[c]]);
  return segmentedDonutSVG(entries, totalPEN, 300, 36, centerLabel, centerSub);
}

const INCOME_PALETTE = ["var(--cat-comida)","var(--cat-delivery)","var(--cat-transporte)","var(--cat-servicios)","var(--cat-entret)","var(--cat-salud)","var(--cat-compras)","var(--cat-transf)","var(--cat-vivienda)","var(--cat-otros)"];

function incomeDonutSVG(bySource, total, centerLabel, centerSub) {
  const keys = Object.keys(bySource).sort((a,b)=>bySource[b]-bySource[a]);
  const entries = keys.map((k,i) => [k, bySource[k], INCOME_PALETTE[i % INCOME_PALETTE.length]]);
  return segmentedDonutSVG(entries, total, 150, 22, centerLabel, centerSub);
}

function incomeLegend(bySource, total) {
  const keys = Object.keys(bySource).sort((a,b)=>bySource[b]-bySource[a]);
  return `<ul class="donut-legend">` + keys.map((k,i) => {
    const amt = bySource[k];
    const pct = total > 0 ? (amt/total*100) : 0;
    const color = INCOME_PALETTE[i % INCOME_PALETTE.length];
    return `<li><i class="cat-swatch" style="background:${color}"></i><span class="name">${k}</span>
      <span class="amt-col">S/ ${fmtMoney(amt)} <span class="pct">${pct.toFixed(1)}%</span></span></li>`;
  }).join("") + `</ul>`;
}

function donutLegend(byCat, byCatFromUSD, totalPEN, prevTotals) {
  const entries = CAT_ORDER.filter(c => byCat[c] > 0).sort((a,b)=>byCat[b]-byCat[a]);
  return `<ul class="donut-legend">` + entries.map(c => {
    const pct = totalPEN > 0 ? (byCat[c]/totalPEN*100) : 0;
    const hasUSD = byCatFromUSD[c] > 0;
    let deltaHtml = "";
    if (prevTotals) {
      const prev = prevTotals[c] || 0;
      if (prev > 0) {
        const diff = byCat[c] - prev;
        const diffPct = (diff / prev) * 100;
        const cls = diff > 0 ? "up" : (diff < 0 ? "down" : "");
        const arrow = diff > 0 ? "▲" : (diff < 0 ? "▼" : "—");
        deltaHtml = `<span class="delta ${cls}">${arrow} ${Math.abs(diffPct).toFixed(0)}% vs mes ant.</span>`;
      } else {
        deltaHtml = `<span class="delta new">nuevo este mes</span>`;
      }
    }
    return `<li><i class="cat-swatch" style="background:${CAT_COLOR[c]}"></i><span class="name">${c}${hasUSD ? '<span class="usd-tag" title="incluye monto convertido de USD">USD</span>' : ""}</span>
      <span class="amt-col">S/ ${fmtMoney(byCat[c])} <span class="pct">${pct.toFixed(1)}%</span>${deltaHtml}</span></li>`;
  }).join("") + `</ul>`;
}

function ingresosCard(scopeMonthKeys, formMonthKey) {
  const list = ingresosForScope(scopeMonthKeys);
  const total = list.reduce((sum,x) => sum + Number(x.montoPEN), 0);
  const bySource = incomeBySource(list);
  const itemsHtml = list.length ? list.map(x => `
    <div class="ing-row">
      <span>${x.desc}${scopeMonthKeys.length>1 ? ` <span class="ing-month">(${monthLabel(x.month)})</span>` : ""}</span>
      <span class="ing-amt">S/ ${fmtMoney(Number(x.montoPEN))}${x.moneda === "USD" ? `<span class="usd-tag" title="convertido">USD</span><br><span style="font-weight:400;color:var(--muted);font-size:10.5px;">US$ ${fmtMoney(Number(x.amount))} @ ${x.tipoCambio}</span>` : ""}</span>
      <button class="ing-del" data-id="${x.id}" data-month="${x.month}" title="Eliminar">×</button>
    </div>`).join("") : "";
  const formHtml = formMonthKey ? `
    <form class="ing-form" id="ingForm" data-month="${formMonthKey}">
      <input type="text" id="ingDesc" placeholder="Fuente (ej. Sueldo)" required>
      <input type="number" id="ingAmt" placeholder="Monto" step="0.01" min="0" required>
      <select id="ingCur">
        <option value="PEN">S/</option>
        <option value="USD">US$</option>
      </select>
      <input type="number" id="ingRate" placeholder="T.C." step="0.001" min="0" style="display:none;">
      <button type="submit" title="Agregar">+</button>
    </form>` : `<p class="ing-hint">Andá a la pestaña de un mes específico para agregar ingresos.</p>`;
  const chartHtml = list.length
    ? `<div class="donut-wrap">
        ${incomeDonutSVG(bySource, total, "S/ "+Math.round(total).toLocaleString("es-PE"), Object.keys(bySource).length+" fuentes")}
        ${incomeLegend(bySource, total)}
      </div>`
    : `<p class="ing-empty">Todavía no cargaste ingresos${formMonthKey ? " para "+monthLabel(formMonthKey) : ""}.</p>`;
  return `
    <div class="card">
      <h3>Ingresos${formMonthKey ? " — "+monthLabel(formMonthKey) : ""}</h3>
      ${chartHtml}
      ${itemsHtml ? `<div class="ing-list">${itemsHtml}</div>` : ""}
      ${formHtml}
    </div>`;
}

function txTable(rows) {
  const sorted = rows.slice().sort((a,b) => (a.f+a.h).localeCompare(b.f+b.h)).reverse();
  const rowsHtml = sorted.map(r => `
    <tr>
      <td>${fmtDate(r.f)}</td>
      <td>${r.h}</td>
      <td><span class="bank-chip">${r.b}</span></td>
      <td>${r.t}</td>
      <td class="monto">S/ ${fmtMoney(r.mp)}${r.c === "USD" ? `<span class="usd-tag" title="convertido">USD</span><br><span style="font-weight:400;color:var(--muted);font-size:10.5px;">US$ ${fmtMoney(r.m)} @ ${r.tc}</span>` : ""}</td>
      <td>${r.co}</td>
      <td><span class="cat-chip"><i class="cat-swatch" style="background:${CAT_COLOR[r.cat]||'var(--cat-otros)'}"></i>${r.cat}</span></td>

  return `<div class="panel table-scroll"><table class="tx">
    <thead><tr><th>Fecha</th><th>Hora</th><th>Banco</th><th>Tipo</th><th>Monto</th><th>Comercio</th><th>Categoría</th></tr></thead>
    <tbody>${rowsHtml}</tbody>
  </table></div>`;
}

function renderMonthOrConsolidated(rows, subLabel, scopeMonthKeys, formMonthKey, prevTotals) {
  const s = computeStats(rows);
  const topCatName = s.topCat ? s.topCat[0] : "—";
  const ingresosTotal = ingresosForScope(scopeMonthKeys).reduce((sum,x) => sum + Number(x.montoPEN), 0);
  return `
    <div class="stat-row">
      <div class="stat"><div class="k">Ingresos</div><div class="v good">S/ ${fmtMoney(ingresosTotal)}</div></div>
      <div class="stat"><div class="k">Gastos</div><div class="v">S/ ${fmtMoney(s.totalPEN)}</div>${s.totalUSDOrigin>0 ? `<div class="sub">incluye US$ ${fmtMoney(s.totalUSDOrigin)} convertidos</div>` : ""}</div>
      <div class="stat"><div class="k">Movimientos</div><div class="v">${s.count}</div></div>
      <div class="stat"><div class="k">Categoría líder</div><div class="v" style="font-size:16px;">${topCatName}</div></div>
    </div>
    ${ingresosCard(scopeMonthKeys, formMonthKey)}
    <div class="card">
      <h3>Gasto por categoría (todo en soles)</h3>
      <div class="donut-wrap">
        ${donutSVG(s.byCat, s.totalPEN, "S/ "+Math.round(s.totalPEN).toLocaleString("es-PE"), s.count+" movs.")}
        ${donutLegend(s.byCat, s.byCatFromUSD, s.totalPEN, prevTotals)}
      </div>
      ${s.totalUSDOrigin>0 ? `<p style="font-size:11px;color:var(--muted);margin:10px 0 0;">Las categorías marcadas <span class="usd-tag" style="margin:0 2px;">USD</span> incluyen un consumo originalmente en dólares, convertido a soles al tipo de cambio del día de esa compra.</p>` : ""}
      ${!prevTotals ? `<p style="font-size:11px;color:var(--muted);margin:10px 0 0;">La comparación con el mes anterior aparece dentro de cada pestaña de mes (no en Consolidado, ni en el primer mes con datos).</p>` : ""}
    </div>
    <section>
      <div class="section-head"><h2>Todos los movimientos${subLabel ? " — "+subLabel : ""}</h2><span class="tag">${s.count} filas</span></div>
      ${txTable(rows)}
    </section>
  `;
}

function render() {
  const months = {};
  for (const r of TX) {
    const k = monthKey(r.f);
    (months[k] = months[k] || []).push(r);
  }
  const monthKeys = Object.keys(months).sort();

  // tabs
  const tabsEl = document.getElementById("tabs");
  let tabsHtml = `<button class="tab-btn ${activeTab==='consolidado'?'active':''}" data-tab="consolidado">Consolidado <span class="n">(${TX.length})</span></button>`;
  for (const k of monthKeys) {
    tabsHtml += `<button class="tab-btn ${activeTab===k?'active':''}" data-tab="${k}">${monthLabel(k)} <span class="n">(${months[k].length})</span></button>`;
  }
  tabsEl.innerHTML = tabsHtml;
  tabsEl.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => { activeTab = btn.dataset.tab; render(); });
  });

  // views
  const viewsEl = document.getElementById("views");
  if (activeTab === "consolidado") {
    viewsEl.innerHTML = renderMonthOrConsolidated(TX, "todos los meses", monthKeys, null, null);
  } else {
    const pmk = prevMonthKey(activeTab);
    const prevTotals = monthKeys.includes(pmk) ? categoryTotalsForMonth(pmk) : null;
    viewsEl.innerHTML = renderMonthOrConsolidated(months[activeTab] || [], monthLabel(activeTab), [activeTab], activeTab, prevTotals);
  }

  // ingresos: form + botones de borrar
  const ingForm = document.getElementById("ingForm");
  if (ingForm) {
    const curSel = document.getElementById("ingCur");
    const rateInput = document.getElementById("ingRate");
    curSel.addEventListener("change", async () => {
      const isUSD = curSel.value === "USD";
      rateInput.style.display = isUSD ? "" : "none";
      rateInput.required = isUSD;
      if (isUSD && !rateInput.value) {
        rateInput.placeholder = "buscando…";
        const r = await fetchUSDPENRate();
        rateInput.placeholder = "T.C.";
        if (r) rateInput.value = r.toFixed(3);
      }
    });
    ingForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const desc = document.getElementById("ingDesc").value.trim();
      const amt = parseFloat(document.getElementById("ingAmt").value);
      const moneda = curSel.value;
      const rate = moneda === "USD" ? parseFloat(rateInput.value) : null;
      if (!desc || isNaN(amt) || amt <= 0) return;
      if (moneda === "USD" && (isNaN(rate) || rate <= 0)) return;
      addIngreso(ingForm.dataset.month, desc, amt, moneda, rate);
      render();
    });
  }
  viewsEl.querySelectorAll(".ing-del").forEach(btn => {
    btn.addEventListener("click", () => { removeIngreso(btn.dataset.month, btn.dataset.id); render(); });
  });

  // tooltip del gráfico de categorías (compartido entre gastos e ingresos)
  const tooltip = document.getElementById("donutTooltip");
  viewsEl.querySelectorAll(".donut-seg").forEach(seg => {
    seg.addEventListener("mouseenter", () => {
      tooltip.innerHTML = `<b>${seg.dataset.cat}</b><br>S/ ${seg.dataset.amt} · ${seg.dataset.pct}%`;
      tooltip.style.display = "block";
    });
    seg.addEventListener("mousemove", (e) => {
      tooltip.style.left = (e.clientX + 14) + "px";
      tooltip.style.top = (e.clientY + 14) + "px";
    });
    seg.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });
  });

  document.getElementById("footerNote").innerHTML =
    `Categorías asignadas automáticamente por nombre de comercio — revisalas en el Sheet y corregí las que no correspondan. ` +
    `Los consumos originalmente en dólares se convierten a soles al tipo de cambio venta SUNAT del día del consumo (o el hábil anterior más cercano si cayó fin de semana). ` +
    `El alquiler (S/ ${RENT_AMOUNT.toLocaleString("es-PE")}, día ${RENT_DAY} de cada mes) se agrega automáticamente como gasto fijo. ` +
    `Los ingresos se cargan a mano y se guardan solo en este navegador (no están en el Sheet ni se sincronizan entre dispositivos). Si los cargás en dólares, el tipo de cambio se intenta buscar automáticamente (si no se puede, se ingresa a mano) y el monto queda guardado ya convertido a soles.`;
}

function setRefreshStatus(ok, when) {
  const dot = document.getElementById("refreshDot");
  const text = document.getElementById("refreshText");
  const t = when.toLocaleTimeString("es-PE", { hour: "2-digit", minute: "2-digit" });
  if (ok) {
    dot.classList.remove("stale");
    text.textContent = `actualizado ${t}`;
  } else {
    dot.classList.add("stale");
    text.textContent = `sin conexión al Sheet — mostrando datos de ${t}`;
  }
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const header = lines[0].split(",");
  const idx = {
    f: header.indexOf("Fecha"), h: header.indexOf("Hora"), b: header.indexOf("Banco"),
    t: header.indexOf("Tipo"), m: header.indexOf("Monto"), c: header.indexOf("Moneda"),
    mp: header.indexOf("MontoPEN"), tc: header.indexOf("TipoCambio"),
    co: header.indexOf("Comercio"), cat: header.indexOf("Categoria")
  };
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    if (!line || !/^\d{4}-\d{2}-\d{2}/.test(line)) continue; // skip blanks / summary rows
    const cells = line.split(",");
    const m = parseFloat(String(cells[idx.m]).replace(/,/g,""));
    if (isNaN(m)) continue;
    const c = cells[idx.c];
    let mp = idx.mp >= 0 ? parseFloat(String(cells[idx.mp]).replace(/,/g,"")) : NaN;
    if (isNaN(mp)) { mp = m; if (c === "USD") console.warn("Fila en USD sin MontoPEN — no se convirtió:", cells[idx.co]); }
    const tc = idx.tc >= 0 && cells[idx.tc] ? parseFloat(cells[idx.tc]) : null;
    rows.push({ f: cells[idx.f], h: cells[idx.h], b: cells[idx.b], t: cells[idx.t], m, c, mp, tc, co: cells[idx.co], cat: cells[idx.cat] });
  }
  return rows;
}

async function refresh() {
  try {
    const res = await fetch(SHEET_CSV_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const parsed = parseCSV(text);
    if (parsed.length === 0) throw new Error("CSV vacío o formato inesperado");
    setTX(parsed);
    lastRefreshOk = true;
  } catch (e) {
    lastRefreshOk = false;
    console.warn("No se pudo refrescar desde el Sheet:", e.message);
  }
  lastRefreshTime = new Date();
  setRefreshStatus(lastRefreshOk, lastRefreshTime);
  render();
}

setTX(TX_INITIAL);
render();
document.getElementById("refreshText").textContent = "cargando…";
refresh();
setInterval(refresh, REFRESH_MS);
</script>
